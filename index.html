<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <title>考公考编资料库</title>
  <meta name="description" content="事业单位、公务员、公基、申论和面试备考资料整理。">
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css">
  <style>
    :root {
      --theme-color: #176f63;
      --content-max-width: 980px;
    }

    body {
      font-size: 16px;
    }

    .markdown-section {
      max-width: var(--content-max-width);
      padding: 32px 32px 48px;
    }

    .markdown-section table {
      display: table;
      width: 100%;
    }

    .markdown-section h1,
    .markdown-section h2,
    .markdown-section h3 {
      color: #173b35;
      font-weight: 700;
    }

    .sidebar {
      padding-top: 12px;
    }

    .sidebar-nav li > a {
      white-space: normal;
      line-height: 1.45;
    }

    .app-name-link img {
      max-width: 42px;
    }

    @media (max-width: 768px) {
      .markdown-section {
        padding: 24px 18px 40px;
      }
    }
  </style>
</head>
<body>
  <div id="app">正在加载资料库...</div>
  <script>
    window.$docsify = {
      name: '考公考编资料库',
      repo: 'yanzhengwei1998/yanzhengwei1998.github.io',
      homepage: 'README.md',
      loadSidebar: true,
      loadNavbar: true,
      subMaxLevel: 3,
      auto2top: true,
      maxLevel: 4,
      mergeNavbar: true,
      search: {
        maxAge: 86400000,
        paths: 'auto',
        placeholder: '搜索资料',
        noData: '没有找到相关内容',
        depth: 4,
        hideOtherSidebarContent: false
      },
      pagination: {
        previousText: '上一页',
        nextText: '下一页',
        crossChapter: true,
        crossChapterText: true
      },
      alias: {
        '/.*/_sidebar.md': '/_sidebar.md',
        '/.*/_navbar.md': '/_navbar.md'
      }
    };
  </script>
  <script src="//cdn.jsdelivr.net/npm/docsify@4"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify/lib/plugins/search.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify-copy-code@2"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify-pagination/dist/docsify-pagination.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify/lib/plugins/zoom-image.min.js"></script>
</body>
</html>
